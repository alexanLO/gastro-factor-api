name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Validate required secrets
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "JWT_SECRET is not configured in GitHub Secrets."
            echo "Go to Settings > Secrets and variables > Actions and create JWT_SECRET."
            exit 1
          fi

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw -B verify
